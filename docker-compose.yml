services:
  # --- PostgreSQL с расширением pgvector (хранилище данных + векторный поиск) ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiap-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiap_password}
      POSTGRES_DB: ${POSTGRES_DB:-aiap}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql включает расширение pgvector при первой инициализации БД
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiap} -d ${POSTGRES_DB:-aiap}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # --- NestJS backend (auth, agents, documents, chat/LangGraph) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiap-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiap}:${POSTGRES_PASSWORD:-aiap_password}@postgres:5432/${POSTGRES_DB:-aiap}?schema=public
      PORT: 4000
      NODE_ENV: production
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # --- Next.js frontend (дашборд + чат со стримингом) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: aiap-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
